# W&B sweep: per_channel_resample_cnn tokenizer — behavior classification
#
# Bayesian search over CNN architecture (depth, width, kernel size,
# activation) and model dimensions.  Learning rate and weight decay are
# held fixed (set in the base experiment config).  The per-channel
# ResampleCNN resamples each EEG channel to target_token_rate then
# applies a stack of 1-D convolutions.
#
# Uses EffectiveBatchSizeCallback to auto-find the largest micro-batch
# size that fits on each GPU.
#
# Launch:
#   uv run python scripts/wandb_sweep.py configs/sweep/per_channel_resample_cnn_sweep.yaml --gpus 0,1,2,3

experiment: tokenizer_explore/wandb_sweep_behavior
tokenizer: per_channel_resample_cnn
extra_overrides:
  - hyperparameters.learning_rate=3.4e-4
  - hyperparameters.weight_decay=0.007
  - "++trainer.callbacks.effective_batch_size._target_=foundry.training.callbacks.EffectiveBatchSizeCallback"
  - "++trainer.callbacks.effective_batch_size.effective_batch_size=1024"
  - "++trainer.callbacks.effective_batch_size.init_val=32"
  - "++trainer.callbacks.effective_batch_size.max_val=512"

parameter_map:
  num_filters: model.tokenizer.temporal_embedding.num_filters
  kernel_size: model.tokenizer.temporal_embedding.kernel_size
  num_conv_layers: model.tokenizer.temporal_embedding.num_conv_layers
  activation: model.tokenizer.temporal_embedding.activation
  target_token_rate: model.tokenizer.temporal_embedding.target_token_rate
  channel_emb_dim: model.tokenizer.channel_emb_dim

wandb:
  name: per_channel_resample_cnn_sweep
  project: foundry
  method: bayes
  run_cap: 100

  metric:
    name: val/ajile_active_behavior_auroc
    goal: maximize

  parameters:
    num_filters:
      values: [8, 12, 16, 24, 32, 48, 64]
    kernel_size:
      values: [5, 7, 9, 13, 17]
    num_conv_layers:
      values: [1, 2, 3, 4]
    target_token_rate:
      values: [50, 100, 200]
    channel_emb_dim:
      values: [32, 64, 128]
