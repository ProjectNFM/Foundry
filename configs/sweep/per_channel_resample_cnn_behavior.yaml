# W&B sweep: per_channel_resample_cnn tokenizer — behavior classification
#
# Searches over CNN architecture and training hyperparameters.
# The per-channel ResampleCNN processes each EEG channel independently with a
# stack of 1-D convolutions after resampling to target_token_rate.
#
# Launch:
#   uv run python scripts/wandb_sweep.py configs/sweep/per_channel_resample_cnn_behavior.yaml --gpus 0,1,2,3

experiment: tokenizer_explore/wandb_sweep_behavior
tokenizer: per_channel_resample_cnn
extra_overrides:
  - hyperparameters.batch_size=128

parameter_map:
  learning_rate: hyperparameters.learning_rate
  weight_decay: hyperparameters.weight_decay
  num_filters: model.tokenizer.temporal_embedding.num_filters
  kernel_size: model.tokenizer.temporal_embedding.kernel_size
  num_conv_layers: model.tokenizer.temporal_embedding.num_conv_layers
  activation: model.tokenizer.temporal_embedding.activation
  target_token_rate: model.tokenizer.temporal_embedding.target_token_rate
  channel_emb_dim: model.tokenizer.channel_emb_dim

wandb:
  name: per_channel_resample_cnn_behavior
  project: foundry
  method: bayes

  metric:
    name: val/ajile_active_behavior_auroc
    goal: maximize

  early_terminate:
    type: hyperband
    min_iter: 15

  parameters:
    learning_rate:
      distribution: log_uniform_values
      min: 1e-5
      max: 5e-3
