_target_: hydra_plugins.foundry_launcher.local_gpu_launcher.LocalGpuLauncher

# List of GPU indices to use.  null = auto-detect via nvidia-smi.
# Override on CLI: hydra.launcher.gpus=[1,2,3]
gpus: null

# When true, auto-detect skips GPUs that already have processes running
# (memory usage >= 1 GiB).  Ignored when gpus is set explicitly.
only_free_gpus: true

# When true, pending jobs are skipped once any job exits with a non-zero code.
stop_on_failure: false
