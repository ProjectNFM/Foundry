defaults:
  - model: null
  - data: null
  - module: default
  - cluster: default
  - logger: wandb
  - _self_
  - trainer: default
  - profiling: default
  - experiment: ???

hyperparameters:
  batch_size: ???
  sequence_length: ???
  patch_duration: ???
  sampling_rate: ???
  fold_number: ???
  num_workers: ???
  learning_rate: ???
  # LR schedule: "warmup_hold_cosine" | "cosine_anneal_decay"
  scheduler: warmup_hold_cosine
  warmup_steps: ???
  hold_steps: ???
  cosine_steps: 0
  decay_steps: ???
  min_lr_factor: 0.1
  weight_decay: ???
  cwt_lr_multiplier: 1.0

stage:
  skip: false

class_weights:
  mode: none
  smoothing: 0.5

run:
  seed: 42
  # Enable torch deterministic algorithms for bitwise reproducibility
  # (slower; leave false for normal training).
  deterministic: false
  # Keep fresh runs independent unless resume is explicitly requested.
  # SLURM restarts still auto-resume from last.ckpt in main.py.
  resume_if_checkpoint_exists: false
  # Reuse a WandB run ID derived from run.name.
  # Keeps dashboards continuous for preempted/relaunched runs with same name.
  resume_wandb_if_name_matches: false
  # A100 benefits from Tensor Core-enabled FP32 matmul kernels.
  float32_matmul_precision: high