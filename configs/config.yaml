defaults:
  - model: null
  - data: null
  - module: classification
  - logger: wandb
  - _self_
  - trainer: default
  - profiling: default
  - experiment: ???

hyperparameters:
  batch_size: ???
  sequence_length: ???
  patch_duration: ???
  sampling_rate: ???
  fold_number: ???
  num_workers: ???
  learning_rate: ???  
  weight_decay: ???

stage:
  skip: false

run:
  # Execution mode:
  # - train: run trainer.fit()
  # - eval: run trainer.validate() from run.eval_checkpoint
  mode: train
  # Path to checkpoint used when run.mode=eval.
  eval_checkpoint: null
  # Keep fresh runs independent unless resume is explicitly requested.
  # SLURM restarts still auto-resume from last.ckpt in main.py.
  resume_if_checkpoint_exists: false
  # Reuse a WandB run ID derived from run.name.
  # Keeps dashboards continuous for preempted/relaunched runs with same name.
  resume_wandb_if_name_matches: false
  # A100 benefits from Tensor Core-enabled FP32 matmul kernels.
  float32_matmul_precision: high

hydra:
  run:
    dir: ${oc.env:SCRATCH,./outputs}/runs/${run.group}/${run.name}
  sweep:
    dir: ${oc.env:SCRATCH,./outputs}/runs/${run.group}
    subdir: ${run.name}
