defaults:
  - model: null
  - data: null
  - module: default
  - logger: wandb
  - _self_
  - trainer: default
  - profiling: default
  - experiment: ???

hyperparameters:
  batch_size: ???
  window_length: ???
  patch_duration: ???
  sampling_rate: ???
  fold_number: ???
  num_workers: ???
  learning_rate: 1e-4
  weight_decay: 0.01

stage:
  skip: false

run:
  # Keep fresh runs deterministic unless resume is explicitly requested.
  # SLURM restarts still auto-resume from last.ckpt in main.py.
  resume_if_checkpoint_exists: false

hydra:
  run:
    dir: ${oc.env:SCRATCH,./outputs}/runs/${run.group}/${run.name}
  sweep:
    dir: ${oc.env:SCRATCH,./outputs}/runs/${run.group}
    subdir: ${run.name}
