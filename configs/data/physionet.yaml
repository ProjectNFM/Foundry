_target_: foundry.data.datamodules.PhysionetDataModule

root: ./data/processed/
batch_size: ${hyperparameters.batch_size}
num_workers: 5
pin_memory: false 
window_length: ${hyperparameters.window_length}
seed: 42

transform:
  - _target_: foundry.transforms.RescaleEEG
    factor: 1e5
  - _target_: foundry.transforms.Patching
    patch_duration: ${hyperparameters.patch_duration}

recording_ids: null
uniquify_channel_ids: true
task_type: RightHandFeetImagery
fold_number: ${hyperparameters.fold_number}
fold_type: inter-subject
dirname: schalk_wolpaw_physionet_2009
