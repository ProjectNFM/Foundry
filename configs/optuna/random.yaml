# Random search for exploration
# Good for getting baseline results quickly and exploring unexpected parameter combinations

defaults:
  - default

sampler:
  type: random
  seed: 42

pruner:
  type: successive_halving
  min_resource: 2
  reduction_factor: 2
  min_early_stopping_rate: 0

optimization:
  n_trials: 50
  n_jobs: 1
  show_progress: true

study:
  direction: minimize
  metric_name: val_loss
