# Bayesian optimization with TPE sampler
# Best for expensive objectives with moderate search space (10-100 hyperparams)

defaults:
  - default

sampler:
  type: tpe
  seed: 42
  n_startup_trials: 15
  consider_prior: true
  prior_weight: 1.0
  consider_magic_clip: true
  consider_endpoints: true

pruner:
  type: successive_halving
  min_resource: 3
  reduction_factor: 3
  min_early_stopping_rate: 0

optimization:
  n_trials: 100
  n_jobs: 1
  show_progress: true

study:
  direction: minimize
  metric_name: val_loss
