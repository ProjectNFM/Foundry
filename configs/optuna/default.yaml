# Default Optuna configuration for hyperparameter optimization
# Uses TPE (Tree-structured Parzen Estimator) sampler with Successive Halving pruner

sampler:
  type: tpe  # Tree-structured Parzen Estimator (Bayesian)
  seed: 42
  n_startup_trials: 10
  n_warmup_steps: 0
  consider_prior: true
  prior_weight: 1.0
  consider_magic_clip: true
  consider_endpoints: false
  n_ei_candidates: 24
  l_transformers: []

pruner:
  type: successive_halving  # Aggressive early stopping
  min_resource: 1
  reduction_factor: 3
  min_early_stopping_rate: 0

optimization:
  n_trials: 50  # Default number of trials
  n_jobs: 1     # Number of parallel jobs
  show_progress: true
  
study:
  direction: minimize  # minimize or maximize
  metric_name: val_loss
