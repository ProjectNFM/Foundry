_target_: lightning.Trainer

max_epochs: 10000
# 32-true  — full FP32, safest baseline (all GPUs)
# 16-mixed — FP16 mixed precision, needs grad scaling (RTX 8000, A100, L40S)
# bf16-mixed — BF16 mixed precision, most stable speedup (A100, L40S only — NOT RTX 8000)
precision: 32-true
accelerator: auto
devices: auto
default_root_dir: .
log_every_n_steps: 10
enable_progress_bar: true
enable_model_summary: false
num_sanity_val_steps: 2
accumulate_grad_batches: 1
logger: ${logger}
callbacks:
  vocab_initializer:
    _target_: foundry.training.callbacks.VocabInitializerCallback
  # rich_model_summary:
  #   _target_: lightning.pytorch.callbacks.RichModelSummary
  rich_progress_bar:
    _target_: lightning.pytorch.callbacks.RichProgressBar
  early_stopping:
    _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val/loss
    patience: 10
    mode: min
    verbose: true
    check_on_train_epoch_end: false
    strict: false
  model_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: checkpoints
    filename: "best-epoch{epoch:03d}-{val/loss:.4f}"
    save_last: true
    monitor: val/loss
    mode: min
    save_top_k: 1
    verbose: true
    save_on_train_epoch_end: false
