    stim_200Hz: sub_bass
    stim_300Hz: sub_bass
    stim_400Hz: sub_bass
    stim_500Hz: sub_bass
    stim_650Hz: low
    stim_800Hz: low
    stim_1000Hz: low
    stim_1500Hz: low
    stim_2000Hz: low_mid
    stim_3000Hz: low_mid
    stim_4000Hz: low_mid
    stim_5000Hz: mid
    stim_7700Hz: mid
    stim_8000Hz: mid
    stim_9500Hz: mid
    stim_10000Hz: high_mid
    stim_12000Hz: high_mid
    stim_13000Hz: high_mid
    stim_15000Hz: high_mid
    stim_16000Hz: high_mid
    stim_18000Hz: high
