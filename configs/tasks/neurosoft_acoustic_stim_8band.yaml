name: neurosoft_acoustic_stim_8band

class_mapping:
  mapping:
    stim_100Hz: low_bass
    stim_200Hz: low_bass
    stim_300Hz: low_bass
    stim_400Hz: low_bass
    stim_500Hz: low_bass
    stim_650Hz: low_bass
    stim_800Hz: mid_bass
    stim_1000Hz: low_mids
    stim_1500Hz: low_mids
    stim_2000Hz: midrange
    stim_3000Hz: midrange
    stim_4000Hz: midrange
    stim_5000Hz: high_mids
    stim_7700Hz: low_treble 
    stim_8000Hz: low_treble
    stim_9500Hz: low_treble
    stim_10000Hz: mid_treble
    stim_12000Hz: high_treble
    stim_13000Hz: high_treble
    stim_15000Hz: mid_treble
    stim_16000Hz: high_treble
    stim_18000Hz: high_treble
    stim_20000Hz: high_treble
    stim_30000Hz: high_treble
    stim_40000Hz: high_treble
  order: [low_bass, mid_bass, low_mids, midrange, high_mids, low_treble, mid_treble, high_treble]

head:
  _target_: foundry.tasks.heads.ReadoutHead

target_extractor:
  _target_: foundry.tasks.targets.TargetExtractor
  timestamp_key: acoustic_stim_trials.timestamps
  value_key: acoustic_stim_trials.behavior_labels

loss:
  _target_: foundry.tasks.losses.CrossEntropyTaskLoss

metrics:
  _target_: foundry.tasks.metrics.classification_metrics

metric_summary_modes:
  acc: max
  f1: max
  auroc: max
  loss: min
