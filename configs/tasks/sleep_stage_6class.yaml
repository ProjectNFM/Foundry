name: sleep_stage_6class

class_mapping:
  mapping:
    Sleep stage W: Wake
    Sleep stage 1: N1
    Sleep stage 2: N2
    Sleep stage 3: N3
    Sleep stage 4: N4
    Sleep stage R: REM
  order: [Wake, N1, N2, N3, N4, REM]

head:
  _target_: foundry.tasks.heads.ReadoutHead

target_extractor:
  _target_: foundry.tasks.targets.TargetExtractor
  timestamp_key: stages.start
  value_key: stages.names

loss:
  _target_: foundry.tasks.losses.CrossEntropyTaskLoss

metrics:
  _target_: foundry.tasks.metrics.classification_metrics

metric_summary_modes:
  acc: max
  f1: max
  auroc: max
  loss: min
