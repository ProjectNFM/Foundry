name: sleep_stage_5class

classification_mapping:
  raw_to_mapped:
    0: 0
    1: 1
    2: 2
    3: 3
    4: 3
    5: 4
  names:
    0: Wake
    1: N1
    2: N2
    3: N3
    4: REM

head:
  _target_: foundry.tasks.heads.ReadoutHead

target_extractor:
