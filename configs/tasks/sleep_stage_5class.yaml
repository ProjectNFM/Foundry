  timestamp_key: stages.timestamps
  value_key: stages.values

loss:
  _target_: foundry.tasks.losses.CrossEntropyTaskLoss

metrics:
  _target_: foundry.tasks.metrics.classification_metrics
  num_classes: 5

metric_summary_modes:
  acc: max
  f1: max
  auroc: max
  loss: min
