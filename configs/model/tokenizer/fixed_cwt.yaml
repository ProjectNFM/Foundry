_target_: foundry.models.tokenizer.EEGTokenizer
patch_duration: null
embed_dim: ${model.embed_dim}
channel_strategy:
  _target_: foundry.models.embeddings.FixedChannelStrategy
  num_channels: ${hyperparameters.num_channels}
temporal_embedding:
  _target_: foundry.models.embeddings.CWTEmbedding
  embed_dim: ${model.embed_dim}
  num_sources: ${hyperparameters.num_channels}
  num_freqs: 9
  min_freq: 2.0
  max_freq: 100.0
  freq_spacing: log
  target_time_tokens: 200
  n_cycles: 7.0
