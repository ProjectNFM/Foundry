_target_: foundry.models.tokenizer.EEGTokenizer
patch_duration: null
embed_dim: ${model.embed_dim}
channel_fusion: concat
channel_emb_dim: 64
channel_strategy:
  _target_: foundry.models.embeddings.PerChannelStrategy
  max_channels: ${hyperparameters.num_channels}
temporal_embedding:
  _target_: foundry.models.embeddings.ResampleCNNEmbedding
  embed_dim: ${eval:'${model.embed_dim} - ${model.tokenizer.channel_emb_dim}'}
  num_sources: 1
  target_token_rate: 100.0
  # num_filters=64 matches per_channel_cwt_cnn's conv stack width
  # for a parameter-matched comparison (~50k temporal params).
  num_filters: 64
  kernel_size: 9
  num_conv_layers: 2
  activation: "gelu"
