_target_: foundry.models.tokenizer.EEGTokenizer
patch_duration: ${hyperparameters.patch_duration}
embed_dim: ${model.embed_dim}
channel_strategy:
  _target_: foundry.models.embeddings.FixedChannelStrategy
  num_channels: ${hyperparameters.num_channels}
temporal_embedding:
  _target_: foundry.models.embeddings.PatchLinearEmbedding
  embed_dim: ${model.embed_dim}
  num_input_channels: ${hyperparameters.num_channels}
  patch_samples: ${patch_samples:${hyperparameters.patch_duration},${hyperparameters.sampling_rate}}
