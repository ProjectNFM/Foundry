_target_: foundry.models.tokenizer.EEGTokenizer
patch_duration: null
embed_dim: ${model.embed_dim}
channel_fusion: add
channel_strategy:
  _target_: foundry.models.embeddings.SpatialProjectionStrategy
  num_channels: ${hyperparameters.num_channels}
  num_sources: ${model.embed_dim}
  projector:
    _target_: foundry.models.embeddings.SessionSpatialProjector
    session_configs: ${hyperparameters.session_configs}
    num_sources: ${model.tokenizer.channel_strategy.num_sources}
    hidden_dim: ${model.embed_dim} 
    common_layer: false
temporal_embedding:
  _target_: foundry.models.embeddings.ResampleCNNEmbedding
  embed_dim: ${model.embed_dim}
  num_sources: ${model.embed_dim}
  target_token_rate: 100.0
  # kernel_size=9 matches the CWT wavelet extent at f_max=30Hz with n_cycles=2.5
  # (2.5/30 s × 100 Hz ≈ 8.3 → 9 odd).  num_filters=247 parameter-matches the
  # CWT's ~1.18M params (embed_dim=256, 9 freqs) to ~1.18M for the CNN.
  num_filters: 247
  kernel_size: 9
  num_conv_layers: 2
  activation: "gelu"
