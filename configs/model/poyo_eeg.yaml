_target_: foundry.models.POYOEEGModel

tokenizer:
  _target_: foundry.models.tokenizer.EEGTokenizer
  patch_duration: 0.1
  embed_dim: ${model.embed_dim}
  channel_strategy:
    _target_: foundry.models.embeddings.FixedChannelStrategy
    num_channels: ???
  temporal_embedding:
    _target_: foundry.models.embeddings.LinearEmbedding
    embed_dim: ${model.embed_dim}
    num_input_channels: ${model.tokenizer.channel_strategy.num_channels}
    patch_samples: ${patch_samples:${model.tokenizer.patch_duration},${hyperparameters.sampling_rate}}

embed_dim: 128
sequence_length: 1.0
latent_step: 0.1
num_latents_per_step: 1
depth: 2
dim_head: 64
cross_heads: 1
self_heads: 8
ffn_dropout: 0.2
lin_dropout: 0.4
atn_dropout: 0.2
emb_init_scale: 0.02
t_min: 1e-2
t_max: 0.5
