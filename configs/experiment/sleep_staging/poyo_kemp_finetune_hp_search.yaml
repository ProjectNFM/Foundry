# @package _global_
#
# Experiment 009: Finetuning hyperparameter search.
#
# Systematic sweep of learning rate, warmup epochs, and early stopping
# patience to find optimal finetuning configuration for pretrained
# CWT-CNN backbone. Run in two phases: pretrained HP search, then
# from-scratch baseline with the same grid for fair comparison.
#
# Phase 1 — Pretrained CWT-CNN HP search (fold 0, 12 runs):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_finetune_hp_search -m
#
# Phase 2 — From-scratch CWT-CNN HP search (fold 0, 12 runs):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_finetune_hp_search \
#       run.pretrained_checkpoint=null \
#       'run.name=kemp_scratch_hp_lr${hyperparameters.learning_rate}_wu${module.warmup_epochs}' \
#       run.group=KEMP_SCRATCH_HP_SEARCH \
#       'run.tags=[sleep_staging,poyo,kemp,scratch,hp_search,exp009]' -m
#
# Phase 3 — 3-fold validation of best configs (after Phase 1 & 2):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_finetune_hp_search \
#       hyperparameters.learning_rate=<best_lr> module.warmup_epochs=<best_wu> \
#       'hyperparameters.fold_number=0,1,2' -m
#   (repeat for scratch with pretrained_checkpoint=null overrides)

defaults:
  - override /model: poyo_eeg
  - override /model/tokenizer: per_channel_cwt_cnn
  - override /data: kemp_sleep_edf/allsess
  - override /hydra/launcher: slurm_default

task_configs:
  - sleep_stage_5class

pretrained_checkpoints:
  per_channel_cwt_cnn: ${oc.env:HOME}/Foundry/runs/runs/PRETRAIN_TOKENIZER_SWEEP/pretrain_tokenizer_per_channel_cwt_cnn/checkpoints/best-epoch003-val_loss_0.0364.ckpt

model:
  zero_output_timestamps: true
  normalize_inputs: true

data:
  split_type: intersubject
  task_type: sleep_stage

run:
  name: kemp_finetune_hp_lr${hyperparameters.learning_rate}_wu${module.warmup_epochs}
  group: KEMP_FINETUNE_HP_SEARCH
  tags: [sleep_staging, poyo, kemp, finetuning, hp_search, exp009]
  log_level: INFO
  project: foundry_finetuning
  compile: default
  pretrained_checkpoint: ${pretrained_checkpoints.per_channel_cwt_cnn}
  freeze_pretrained: false

module:
  warmup_epochs: 0

class_weights:
  mode: auto
  smoothing: 1.0

hyperparameters:
  batch_size: 512
  sequence_length: 2.0
  patch_duration: null
  sampling_rate: null
  fold_number: 0
  num_workers: 6
  num_channels: null
  session_configs: null
  learning_rate: 1e-4
  weight_decay: 0.01

trainer:
  max_epochs: 1000
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/sleep_stage_5class_f1
      mode: max
      patience: 50
    model_checkpoint:
      monitor: val/sleep_stage_5class_f1
      mode: max
      auto_insert_metric_name: false
      filename: "best-epoch{epoch:03d}-val_f1_{val/sleep_stage_5class_f1:.4f}"

hydra:
  sweeper:
    params:
      hyperparameters.learning_rate: 1e-5, 3e-5, 5e-5, 1e-4
      module.warmup_epochs: 0, 5, 10
  launcher:
    tasks_per_node: 1
    cpus_per_task: 6
    mem_gb: 32
    gres: gpu:l40s:1
    timeout_min: 360
    setup:
      - "set -a"
      - "source .env"
      - "set +a"
      - "export RANK=0"
      - "uv run python -m foundry.tools.stage_data --experiment sleep_staging/poyo_kemp_finetune_hp_search"
