# @package _global_
#
# Experiment 011: Session embedding ablation.
#
# Tests whether disabling session embeddings reduces the train-val loss gap
# and improves inter-subject generalization for sleep staging.
#
# The POYOEEGModel session_emb is added to both input tokens and output
# queries. With inter-subject splits, validation sessions are unseen so the
# embedding falls back to a meaningless default. This experiment disables
# session_emb entirely to force the model to rely only on the EEG signal.
#
# Phase 1 — Scratch no-session-emb LR sweep (fold 0, 4 runs):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_session_emb_ablation -m
#
# Phase 1 — Pretrained no-session-emb LR sweep (fold 0, 4 runs):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_session_emb_ablation \
#       run.pretrained_checkpoint='${pretrained_checkpoints.per_channel_cwt_cnn}' \
#       'run.name=kemp_no_session_emb_lr${hyperparameters.learning_rate}_pretrained' \
#       run.init_mode=pretrained \
#       'run.tags=[sleep_staging,poyo,kemp,no_session_emb,pretrained,exp011]' -m
#
# Phase 1 — With-session-emb baselines (fold 0, 2 runs for comparison):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_session_emb_ablation \
#       model.disable_session_emb=false \
#       hyperparameters.learning_rate=1e-4 \
#       'run.name=kemp_with_session_emb_lr0.0001_scratch' \
#       run.group=KEMP_SESSION_EMB_ABLATION_CONTROLS \
#       'run.tags=[sleep_staging,poyo,kemp,with_session_emb,control,exp011]'
#
#   uv run python main.py experiment=sleep_staging/poyo_kemp_session_emb_ablation \
#       model.disable_session_emb=false \
#       hyperparameters.learning_rate=1e-4 \
#       run.pretrained_checkpoint='${pretrained_checkpoints.per_channel_cwt_cnn}' \
#       'run.name=kemp_with_session_emb_lr0.0001_pretrained' \
#       run.init_mode=pretrained \
#       run.group=KEMP_SESSION_EMB_ABLATION_CONTROLS \
#       'run.tags=[sleep_staging,poyo,kemp,with_session_emb,control,exp011]'
#
# Phase 2 — 3-fold validation (fill in best lr from Phase 1):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_session_emb_ablation \
#       hyperparameters.learning_rate=<best_lr> \
#       run.group=KEMP_SESSION_EMB_ABLATION_VALIDATION \
#       'run.name=kemp_no_session_emb_val_fold${hyperparameters.fold_number}' \
#       'run.tags=[sleep_staging,poyo,kemp,no_session_emb,validation,exp011]' \
#       'hyperparameters.fold_number=0,1,2' -m

defaults:
  - override /model: poyo_eeg
  - override /model/tokenizer: per_channel_cwt_cnn
  - override /data: kemp_sleep_edf/allsess
  - override /hydra/launcher: slurm_default

task_configs:
  - sleep_stage_5class

pretrained_checkpoints:
  per_channel_cwt_cnn: ${oc.env:HOME}/Foundry/runs/runs/PRETRAIN_TOKENIZER_SWEEP/pretrain_tokenizer_per_channel_cwt_cnn/checkpoints/best-epoch003-val_loss_0.0364.ckpt

model:
  zero_output_timestamps: true
  normalize_inputs: true
  disable_session_emb: true

data:
  split_type: intersubject
  task_type: sleep_stage

run:
  name: kemp_no_session_emb_lr${hyperparameters.learning_rate}_${run.init_mode}
  group: KEMP_SESSION_EMB_ABLATION
  tags: [sleep_staging, poyo, kemp, no_session_emb, exp011]
  log_level: INFO
  project: foundry_finetuning
  compile: default
  pretrained_checkpoint: null
  freeze_pretrained: false
  init_mode: scratch

class_weights:
  mode: auto
  smoothing: 1.0

hyperparameters:
  batch_size: 512
  sequence_length: 2.0
  patch_duration: null
  sampling_rate: null
  fold_number: 0
  num_workers: 6
  num_channels: null
  session_configs: null
  learning_rate: 1e-4
  weight_decay: 0.01

trainer:
  max_epochs: 1000
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/sleep_stage_5class_f1
      mode: max
      patience: 50
    model_checkpoint:
      monitor: val/sleep_stage_5class_f1
      mode: max
      auto_insert_metric_name: false
      filename: "best-epoch{epoch:03d}-val_f1_{val/sleep_stage_5class_f1:.4f}"

hydra:
  sweeper:
    params:
      hyperparameters.learning_rate: 1e-5, 3e-5, 5e-5, 1e-4
  launcher:
    tasks_per_node: 1
    cpus_per_task: 6
    mem_gb: 32
    gres: gpu:l40s:1
    timeout_min: 360
    setup:
      - "set -a"
      - "source .env"
      - "set +a"
      - "export RANK=0"
      - "uv run python -m foundry.tools.stage_data --experiment sleep_staging/poyo_kemp_session_emb_ablation"
