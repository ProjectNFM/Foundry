# @package _global_
#
# Finetune a pretrained model on Kemp Sleep 5-class staging.
#
# Loads backbone + tokenizer weights from a MaskedPOYOEEGModel checkpoint
# (experiment 005) and finetunes all parameters on Kemp Sleep.
# The pretrained_checkpoints map automatically selects the correct checkpoint
# for each tokenizer in the sweep.
#
# SLURM sweep (2 tokenizers × 3 folds = 6 runs):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_finetune_from_pretrain -m
#
# Local dry-run (single combo, no SLURM):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_finetune_from_pretrain \
#     model/tokenizer=per_channel_resample_cnn hyperparameters.fold_number=0

defaults:
  - override /model: poyo_eeg
  - override /data: kemp_sleep_edf/allsess
  - override /hydra/launcher: slurm_default

task_configs:
  - sleep_stage_5class

# Tokenizer name → best pretrained checkpoint from experiment 005
# (group PRETRAIN_TOKENIZER_SWEEP).
pretrained_checkpoints:
  per_channel_resample_cnn: ${oc.env:HOME}/Foundry/runs/runs/PRETRAIN_TOKENIZER_SWEEP/pretrain_tokenizer_per_channel_resample_cnn/checkpoints/best-epoch003-val_loss_0.1190.ckpt
  per_channel_cwt_cnn: ${oc.env:HOME}/Foundry/runs/runs/PRETRAIN_TOKENIZER_SWEEP/pretrain_tokenizer_per_channel_cwt_cnn/checkpoints/best-epoch003-val_loss_0.0364.ckpt

model:
  zero_output_timestamps: true
  normalize_inputs: true

data:
  split_type: intersubject
  task_type: sleep_stage

run:
  name: kemp_finetune_${hydra:runtime.choices.model/tokenizer}_fold${hyperparameters.fold_number}
  group: KEMP_FINETUNE_FROM_PRETRAIN_FIXED
  tags: [sleep_staging, poyo, kemp, finetuning, pretrained]
  log_level: INFO
  project: foundry_finetuning
  compile: default
  pretrained_checkpoint: ${pretrained_checkpoints.${hydra:runtime.choices.model/tokenizer}}
  freeze_pretrained: false

class_weights:
  mode: auto
  smoothing: 1.0

hyperparameters:
  batch_size: 512
  sequence_length: 2.0
  patch_duration: null
  sampling_rate: null
  fold_number: 0
  num_workers: 6
  num_channels: null
  session_configs: null
  learning_rate: 1e-4
  weight_decay: 0.01

trainer:
  max_epochs: 1000
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/sleep_stage_5class_f1
      mode: max
      patience: 20
    model_checkpoint:
      monitor: val/sleep_stage_5class_f1
      mode: max
      auto_insert_metric_name: false
      filename: "best-epoch{epoch:03d}-val_f1_{val/sleep_stage_5class_f1:.4f}"

hydra:
  sweeper:
    params:
      model/tokenizer: per_channel_resample_cnn, per_channel_cwt_cnn
      hyperparameters.fold_number: 0, 1, 2
  launcher:
    tasks_per_node: 1
    cpus_per_task: 6
    mem_gb: 32
    gres: gpu:l40s:1
