# @package _global_

defaults:
  - override /model: eegnet
  - override /data: kemp_sleep_edf/singlesess

task_configs:
  - sleep_stage_5class

model:
  num_channels: 2
  num_samples: 3000

data:
  split_type: intrasession
  task_type: sleep_stage

run:
  name: kemp_sleep_eegnet_singlesess
  group: SLEEP_STAGING
  tags: [sleep_staging, eegnet, kemp, singlesess]
  seed: 42
  log_level: INFO

class_weights:
  mode: null
  smoothing: 0.1

hyperparameters:
  batch_size: 128
  sequence_length: 30.0
  patch_duration: 0.1
  sampling_rate: 100
  fold_number: 0
  num_workers: 4
  learning_rate: 1e-4
  weight_decay: 0.01

trainer:
  max_epochs: 1000
  precision: bf16-mixed
  devices: 1
  callbacks:
    early_stopping:
      monitor: val/sleep_stage_5class_f1
      mode: max
      patience: 20
    model_checkpoint:
      monitor: val/sleep_stage_5class_f1
      mode: max
      auto_insert_metric_name: false
      filename: "best-epoch{epoch:03d}-val_f1_{val/sleep_stage_5class_f1:.4f}"
