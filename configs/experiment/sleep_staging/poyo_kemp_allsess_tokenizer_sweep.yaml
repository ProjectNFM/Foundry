# @package _global_
#
# Kemp Sleep tokenizer baseline: sweep tokenizers × folds to get an initial
# baseline across all three inter-subject CV folds.
#
# Local dry-run (single combo, no SLURM):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_allsess_tokenizer_sweep model/tokenizer=per_channel_cwt
#
# SLURM sweep (all combos):
#   uv run python main.py experiment=sleep_staging/poyo_kemp_allsess_tokenizer_sweep -m

defaults:
  - override /model: poyo_eeg
  - override /data: kemp_sleep_edf/allsess
  - override /hydra/launcher: slurm_default

task_configs:
  - sleep_stage_5class

model:
  zero_output_timestamps: true
  normalize_inputs: true

data:
  split_type: intersubject
  task_type: sleep_stage

run:
  name: kemp_sleep_${hydra:runtime.choices.model/tokenizer}_fold${hyperparameters.fold_number}
  group: KEMP_SLEEP_TOKENIZER_BASELINE
  tags: [sleep_staging, poyo, kemp, allsess, tokenizer_sweep]
  log_level: INFO
  project: foundry_finetuning
  compile: default

class_weights:
  mode: auto
  smoothing: 1.0

hyperparameters:
  batch_size: 512
  sequence_length: 2.0
  patch_duration: null
  sampling_rate: null
  fold_number: 0
  num_workers: 6
  num_channels: null
  session_configs: null
  learning_rate: 1e-4
  weight_decay: 0.01

trainer:
  max_epochs: 1000
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/sleep_stage_5class_f1
      mode: max
      patience: 20
    model_checkpoint:
      monitor: val/sleep_stage_5class_f1
      mode: max
      auto_insert_metric_name: false
      filename: "best-epoch{epoch:03d}-val_f1_{val/sleep_stage_5class_f1:.4f}"

hydra:
  sweeper:
    params:
      model/tokenizer: per_channel_resample_cnn, per_channel_cwt_cnn, per_channel_per_timepoint_linear
      hyperparameters.fold_number: 0, 1, 2
  launcher:
    tasks_per_node: 1
    cpus_per_task: 6
    mem_gb: 32
    gres: gpu:l40s:1
