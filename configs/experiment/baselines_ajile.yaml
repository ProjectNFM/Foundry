# @package _global_

defaults:
  - override /model: null
  - override /data: ajile

model:
  _target_: foundry.models.EEGNetEncoder
  readout_specs:
    - behavior_4class
  num_channels: 94
  num_samples: 500

run:
  name: ajile_baselines
  group: BASELINES
  tags: [baselines, training, eeg_net_encoder, ajile]
  seed: 42
  log_level: INFO

trainer:
  max_epochs: 1000
