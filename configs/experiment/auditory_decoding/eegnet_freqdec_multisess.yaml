# @package _global_
#
# Per-recording EEGNet sweep over all NeuroSoft minipig raw sessions.
#
# Local dry-run (single recording from data config):
#   uv run python main.py experiment=eegnet_neurosoft_sweep
#
# SLURM sweep (one job per raw recording):
#   uv run python main.py experiment=eegnet_neurosoft_sweep -m

defaults:
  - override /model: eeg_net_encoder
  - override /data: neurosoft_minipigs_singlesess
  - override /hydra/launcher: slurm_default

model:
  num_channels: ${get_num_ecog_channels_by_name:${data.root}/neurosoft_minipigs_2026,${data.recording_ids.0}}
  num_samples: 1000

data:
  split_type: intrasession-causal
  task_type: acoustic_stim

run:
  name: eegnet_neurosoft_${data.recording_ids.0}
  group: EEGNET_NEUROSOFT_ALL_SESSIONS
  tags: [sweep, eeg_net_encoder, neurosoft]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  window_length: 0.5
  patch_duration: 0.1
  fold_number: 0
  num_workers: 4
  learning_rate: 0.0015

trainer:
  max_epochs: 1000
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/neurosoft_acoustic_stim_f1
      mode: max
      patience: 20
    model_checkpoint:
      monitor: val/neurosoft_acoustic_stim_f1
      mode: max
      auto_insert_metric_name: false
      filename: "best-epoch{epoch:03d}-val_f1_{val/neurosoft_acoustic_stim_f1:.4f}"

stage:
  skip: true

hydra:
  sweeper:
    params:
      data.recording_ids.0: ${config_list_sweep_choices:configs/data/neurosoft_minipigs_multisess_raw.yaml,recording_ids}
