# @package _global_
#
# Multisession POYO/iEEG frequency-decoding experiment for Neurosoft monkey
# acoustic-stimulation recordings.

defaults:
  - override /model: poyo_eeg
  - override /model/tokenizer: per_channel_patch_cnn
  - override /data: neurosoft_monkeys/multisess_raw
  - override /module: classification

model:
  zero_output_timestamps: true
  tokenizer:
    channel_fusion: concat
    channel_emb_dim: ${hyperparameters.channel_emb_dim}
    temporal_embedding:
      embed_dim: ${hyperparameters.token_embed_dim}
      num_filters: ${hyperparameters.cnn_num_filters}
      kernel_size: ${hyperparameters.cnn_kernel_size}
      stride: ${hyperparameters.cnn_stride}

data:
  split_type: intrasession-causal
  task_type: acoustic_stim

run:
  name: poyo_neurosoft_monkeys_freqdec_multisess
  group: NEUROSOFT_MONKEYS_MULTISESSION
  tags:
    - neurosoft
    - monkeys
    - poyo_eeg
    - multisession
    - frequency_decoding
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 128
  sequence_length: 0.5
  patch_duration: 0.1
  fold_number: 0
  num_workers: 8
  sampling_rate: 2000
  learning_rate: 1e-4
  weight_decay: 0.01
  channel_emb_dim: 64
  token_embed_dim: 192
  cnn_num_filters: 32
  cnn_kernel_size: ${patch_samples:${hyperparameters.patch_duration},${hyperparameters.sampling_rate}}
  cnn_stride: ${hyperparameters.cnn_kernel_size}
  num_channels: null
  session_configs: null

trainer:
  devices: 1
  max_epochs: 1000
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/loss
      mode: min
      patience: 20
    model_checkpoint:
      monitor: val/loss
      mode: min
      auto_insert_metric_name: false
      filename: "best-val-loss"

stage:
  skip: true
