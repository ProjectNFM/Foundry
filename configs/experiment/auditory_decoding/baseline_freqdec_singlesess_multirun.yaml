# @package _global_
#
# Per-recording EEGNet sweep over all NeuroSoft minipig raw sessions.
# The sweep choices are generated from `configs/data/neurosoft_minipigs/multisess_raw.yaml`.
#
# Execution policy:
# - Default is truly sequential because `hydra.sweeper.max_batch_size: 1`.
# - Override parallelism from CLI with `hydra.sweeper.max_batch_size=<N>`.
#
# Launcher usage:
# - Local sequential (default launcher, no parallelism):
#   uv run python main.py experiment=auditory_decoding/baseline_freqdec_singlesess_multirun -m
# - SLURM (one job per sweep point):
#   uv run python main.py experiment=auditory_decoding/baseline_freqdec_singlesess_multirun hydra/launcher=slurm_default -m
# - SLURM packed (example 4 tasks per node):
#   uv run python main.py experiment=auditory_decoding/baseline_freqdec_singlesess_multirun hydra/launcher=slurm_default hydra.launcher.tasks_per_node=4 -m

defaults:
  - override /model: linear # linear, mlp, gru, shallowcnn, temporalcnn, eegnet
  - override /data: neurosoft_minipigs/singlesess

task_configs:
  - neurosoft_acoustic_stim

model:
  num_channels: ${get_num_ecog_channels_by_name:${data.root}/neurosoft_minipigs_2026,${data.dataset_kwargs.recording_ids.0}}
  num_samples: 1000

data:
  split_type: intrasession-causal
  task_type: acoustic_stim

run:
  name: ${hydra:runtime.choices.model}_neurosoft_${data.dataset_kwargs.recording_ids.0}
  group: NEUROSOFT_SINGLE_SESSION
  tags:
    - neurosoft
    - baselines
    - training
    - ${hydra:runtime.choices.model}
  log_level: INFO

hyperparameters:
  batch_size: 64
  sequence_length: 0.5
  fold_number: 0
  num_workers: 4
  learning_rate: 0.0015
  weight_decay: 0.01

trainer:
  max_epochs: 1000
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/neurosoft_acoustic_stim_f1
      mode: max
      patience: 20
    model_checkpoint:
      monitor: val/neurosoft_acoustic_stim_f1
      mode: max
      auto_insert_metric_name: false
      filename: "best-epoch{epoch:03d}-val_f1_{val/neurosoft_acoustic_stim_f1:.4f}"

stage:
  skip: true

hydra:
  sweeper:
    max_batch_size: 1
    params:
      data.recording_ids.0: ${config_list_sweep_choices:configs/data/neurosoft_minipigs/multisess_raw.yaml,recording_ids}
