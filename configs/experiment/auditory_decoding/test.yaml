# @package _global_
#
# POYO-EEG on NeuroSoft minipig intersession 8-band acoustic stimulus decoding.
#
# Override ``data.subject`` to select the target subject.
# Eligible subjects (≥2 sessions): sub-01, sub-02, sub-03, sub-04, sub-05, sub-07
#
# Usage:
#   uv run python main.py experiment=auditory_decoding/poyo_neurosoft_8band_intersession data.subject=sub-03

defaults:
  - override /model: poyo_eeg
  - override /model/tokenizer: per_channel_resample_cnn_add
  - override /data: neurosoft_monkeys/multisess_raw
  - override /cluster: cscs

task_configs:
  - neurosoft_acoustic_stim_8band

model:
  zero_output_timestamps: true
  normalize_inputs: false
  atn_dropout: 0.4

data:
  split_type: intrasession-block
  task_type: acoustic_stim

run:
  project: poyo_test
  name: ${hydra:runtime.choices.model}_neurosoft_8band
  group: DEBUG
  tags:
    - neurosoft
    - ${hydra:runtime.choices.model}
    - training
    - 8band
    - monkeys
    - hp-tuning
    - intrases-multisub
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 128
  sequence_length: 0.5
  patch_duration: 0.1
  fold_number: 0
  num_workers: 4
  sampling_rate: 2000
  scheduler: cosine_anneal_decay # warmup_hold_cosine | cosine_anneal_decay
  warmup_steps: 0
  hold_steps: 0
  cosine_steps: 30000
  decay_steps: 0
  learning_rate: 2.5e-5
  weight_decay: 0.08

trainer:
  gradient_clip_val: 1
  gradient_clip_algorithm: "norm"
  max_epochs: 1000
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/neurosoft_acoustic_stim_8band_f1
      mode: max
      patience: 50
    model_checkpoint:
      monitor: val/neurosoft_acoustic_stim_8band_f1
      mode: max
      auto_insert_metric_name: false
      filename: "best-epoch{epoch:03d}-val_f1_{val/neurosoft_acoustic_stim_8band_f1:.4f}"
