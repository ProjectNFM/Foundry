# @package _global_
#
# Per-recording sweep over all NeuroSoft monkey raw sessions.
# The sweep replaces the full `data.recording_ids` list with one session per job
# (see `config_list_sweep_one_recording_lists`); overriding only `recording_ids.0`
# would leave the rest of the multisession list from the data preset and break
# `num_channels` / batch shapes.
#
# Execution policy:
# - Default is truly sequential because `hydra.sweeper.max_batch_size: 1`.
# - Override parallelism from CLI with `hydra.sweeper.max_batch_size=<N>`.
#
# Launcher usage:
# - Local sequential (default launcher, no parallelism):
#   uv run python main.py experiment=auditory_decoding/baselines/eegnet_freqdec_singlesess_multirun -m
# - SLURM (one job per sweep point):
#   uv run python main.py experiment=auditory_decoding/baselines/eegnet_freqdec_singlesess_multirun hydra/launcher=slurm_default -m
# - SLURM packed (example 4 tasks per node):
#   uv run python main.py experiment=auditory_decoding/baselines/eegnet_freqdec_singlesess_multirun hydra/launcher=slurm_default hydra.launcher.tasks_per_node=4 -m

defaults:
  - override /model: eegnet
  - override /data: neurosoft_monkeys/multisess_raw
  - override /cluster: cscs

model:
  num_channels: ${get_num_ecog_channels_by_name:${data.root}/neurosoft_monkeys_2026,${data.recording_ids.0}}
  num_samples: 250 # sequence length * sampling rate

data:
  split_type: intrasession-block
  task_type: acoustic_stim

run:
  project: auditory_decoding_singlesess
  name: Monkey_notch_baseline_param_ib_${data.recording_ids.0}_fold${hyperparameters.fold_number}
  group: NEUROSOFT_SINGLE_SESSION
  tags:
    - neurosoft
    - baselines
    - training
    - ${hydra:runtime.choices.model}
    - raw_data
    - monkeys
    - singlesess
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  sequence_length: 0.5
  fold_number: 0
  num_workers: 16
  learning_rate: 0.0015
  weight_decay: 0.018

trainer:
  max_epochs: 1000
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/loss
      mode: min
      patience: 40
    model_checkpoint:
      monitor: val/loss
      mode: min
      auto_insert_metric_name: false
      filename: "monkey-best-epoch{epoch:03d}-val_loss_{val/loss:.4f}"

stage:
  skip: true

hydra:
  sweeper:
    max_batch_size: 1000
    params:
      data.recording_ids: ${config_list_sweep_one_recording_lists:configs/data/neurosoft_monkeys/multisess_raw.yaml,recording_ids}
      hyperparameters.fold_number: choice(0)