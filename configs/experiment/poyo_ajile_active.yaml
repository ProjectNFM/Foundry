# @package _global_

defaults:
  - override /model: poyo_eeg
  - override /data: ajile_singlesess

model:
  tokenizer:
    patch_duration: ${hyperparameters.patch_duration}
    channel_strategy:
      num_channels: 94

data:
  split_type: intrasession
  task_type: active_vs_inactive

run:
  name: ajile_poyo_eeg_classifier
  group: DEBUG
  tags: [debug, baselines, training, poyo_eeg, ajile]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64 
  window_length: 1.0
  patch_duration: 0.1
  sampling_rate: 500
  fold_number: 0
  num_workers: 5
