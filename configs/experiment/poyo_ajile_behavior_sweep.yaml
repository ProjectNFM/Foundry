# @package _global_
#
# Example: sweep with multiple jobs packed onto the same GPU node.
#
# The EEGNet baseline is small enough that several runs fit in the memory of a
# single GPU.  Setting tasks_per_node > 1 tells the PackedSubmititLauncher to
# bundle that many sweep jobs into one SLURM allocation, cutting queue wait
# time and quota usage.
#
# Data staging is done once per node in the launcher's setup commands, before
# any of the packed tasks start.  Each task then skips its own staging step
# (stage.skip: true) and reads directly from the pre-staged path.
#
# Local dry-run (single combo, no SLURM):
#   uv run python main.py experiment=eegnet_ajile_packed_sweep
#
# SLURM packed sweep (4 jobs share each GPU node):
#   uv run python main.py experiment=eegnet_ajile_packed_sweep -m

defaults:
  - override /model: poyo_eeg
  - override /data: ajile_singlesess
  - override /hydra/launcher: slurm_default

model:
  patch_duration: ${hyperparameters.patch_duration}
  input_embedding:
    num_channels: 94
    patch_samples: 50 

data:
  root: ${oc.env:SLURM_TMPDIR}/brainsets/processed
  split_type: intrasession
  task_type: behavior

run:
  name: poyo_ajile_behavior_sweep_lr${hyperparameters.learning_rate}_bs${hyperparameters.batch_size}_cw${module.class_weights}
  group: POYO_AJILE_BEHAVIOR_SWEEP
  tags: [sweep, poyo_eeg, ajile]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  window_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 4
  learning_rate: 1e-4

trainer:
  max_epochs: 1000
  callbacks:
    early_stopping:
      monitor: val/ajile_active_behavior_f1
      mode: max

# No need to stage in main as staging is done in the launcher's setup commands.
stage:
  skip: true

hydra:
  sweeper:
    params:
      hyperparameters.learning_rate: choice(1e-3, 5e-4, 1e-4)
      hyperparameters.batch_size: choice(32, 64, 128)
      module.class_weights: choice(auto, none)
  launcher:
    tasks_per_node: 3
    cpus_per_task: 4
    mem_gb: 128
    gres: gpu:l40s:1
    setup:
      - "set -a"
      - "source .env"
      - "set +a"
      - "export RANK=0"
      - "uv run python -m foundry.tools.stage_data --experiment poyo_ajile_behavior_sweep"
