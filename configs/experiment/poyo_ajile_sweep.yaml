# @package _global_
#
# Example: hyperparameter sweep over batch size and learning rate on SLURM.
#
# Local dry-run (single combo, no SLURM):
#   uv run python main.py experiment=poyo_ajile_sweep
#
# SLURM sweep (all combos as separate jobs):
#   uv run python main.py experiment=poyo_ajile_sweep -m

defaults:
  - override /model: poyo_eeg
  - override /data: ajile_singlesess
  - override /hydra/launcher: slurm_default

model:
  patch_duration: ${hyperparameters.patch_duration}
  input_embedding:
    num_channels: 94
    patch_samples: 50

data:
  split_type: intrasession
  task_type: active_vs_inactive

run:
  name: ajile_poyo_sweep_bs${hyperparameters.batch_size}_lr${hyperparameters.learning_rate}
  group: POYO_AJILE_SWEEP
  tags: [sweep, poyo_eeg, ajile]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  window_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 5

hydra:
  sweeper:
    params:
      hyperparameters.batch_size: choice(32, 64, 128)
      hyperparameters.learning_rate: choice(1e-3, 1e-4, 5e-4)
  launcher:
    mem_gb: 48
    gres: gpu:l40s:1
