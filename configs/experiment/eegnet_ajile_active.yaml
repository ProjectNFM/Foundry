# @package _global_

defaults:
  - override /model: eeg_net_encoder
  - override /data: ajile_singlesess

model:
  num_channels: 94
  num_samples: 500

data:
  split_type: intrasession
  task_type: active_vs_inactive

run:
  name: ajile_eegnet_classifier
  group: DEBUG
  tags: [debug, baselines, training, eeg_net_encoder, ajile]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64 
  window_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 5