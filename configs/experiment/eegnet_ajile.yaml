# @package _global_

defaults:
  - override /model: eeg_net_encoder
  - override /data: ajile_active_inactive_singlesess

model:
  readout_specs:
    - ajile_inactive_active
  num_channels: 94
  num_samples: 500

run:
  name: ajile_eegnet_classifier
  group: DEBUG
  tags: [debug, baselines, training, eeg_net_encoder, ajile]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64 
  window_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 0