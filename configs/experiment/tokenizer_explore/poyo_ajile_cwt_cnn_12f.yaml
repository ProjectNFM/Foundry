# @package _global_
#
# Experiment 5: Low-capacity CWT+CNN hybrid
#
# Tests whether the CWT+CNN architectural advantage persists when the conv
# stack is reduced to 12 filters (matching the original CNN's capacity).
# If CWT+CNN 12f still outperforms CNN 12f, the benefit is purely from
# the CWT preprocessing, not from any capacity difference.
#
# Only runs CWT+CNN 12f; CNN 12f at 200 Hz already exists in TOKEN_RATE_SWEEP.
# 1 tokenizer × 2 folds = 2 runs.
#
# Launch:
#   uv run python main.py experiment=tokenizer_explore/poyo_ajile_cwt_cnn_12f -m

defaults:
  - override /model: poyo_eeg
  - override /data: ajile/multisess
  - override /hydra/launcher: local_gpu

model:
  zero_output_timestamps: true
  embed_dim: 256
  tokenizer:
    temporal_embedding:
      target_token_rate: 200

data:
  split_type: intrasession
  task_type: behavior

run:
  name: ${hydra:runtime.choices.model/tokenizer}_rate200_fold${hyperparameters.fold_number}
  group: CWT_CNN_12F
  tags: [cwt_cnn_12f, behavior, poyo_eeg, ajile, intrasession, exp5]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  sequence_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 32
  learning_rate: 3e-4
  weight_decay: 0.007
  cwt_lr_multiplier: 1.0
  num_channels: null
  sampling_rate: null
  session_configs: null

trainer:
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  callbacks:
    effective_batch_size:
      _target_: foundry.training.callbacks.EffectiveBatchSizeCallback
      effective_batch_size: 1024
      init_val: 32
      max_val: 512
    early_stopping:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      patience: 20
    model_checkpoint:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      auto_insert_metric_name: false
      filename: best-behavior

hydra:
  launcher:
    gpus:
      - 0
      - 2
  sweeper:
    params:
      model/tokenizer: per_channel_cwt_cnn_12f
      hyperparameters.fold_number: "0,1"
