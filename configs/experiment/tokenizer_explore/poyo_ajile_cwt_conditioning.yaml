# @package _global_
#
# Experiment 7: CWT+CNN Scalogram Conditioning — Highpass, Log-Mag, Freq-Norm
#
# Tests whether input highpass filtering, log-magnitude compression, and
# per-frequency instance normalization (individually and in combination)
# improve CWT+CNN downstream behavior classification on real EEG data.
# All CWT+CNN variants use 64 conv filters and are compared against
# CNN 64f (parameter-matched baseline without CWT preprocessing).
#
# Motivated by synthetic stability experiments showing:
#   - highpass: near-perfect DC offset rejection
#   - log_mag:  strong additive corruption resistance (noise, spikes, dropout)
#   - hp+log:   best overall (wins 5/6 corruption types in toy experiment)
#
# 3 CWT+CNN variants × 2 folds = 6 runs.
# Baselines (CWT+CNN 64f, CNN 64f) reused from CWT_LR_AND_PARAM_MATCH.
#
# Launch:
#   uv run python main.py experiment=tokenizer_explore/poyo_ajile_cwt_conditioning -m

defaults:
  - override /model: poyo_eeg
  - override /data: ajile/multisess
  - override /hydra/launcher: local_gpu

model:
  zero_output_timestamps: true
  embed_dim: 256
  tokenizer:
    temporal_embedding:
      target_token_rate: 200

data:
  split_type: intrasession
  task_type: behavior

run:
  name: ${hydra:runtime.choices.model/tokenizer}_rate200_fold${hyperparameters.fold_number}
  group: CWT_CONDITIONING
  tags: [cwt_conditioning, behavior, poyo_eeg, ajile, intrasession, exp7]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  sequence_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 32
  learning_rate: 3e-4
  weight_decay: 0.007
  num_channels: null
  sampling_rate: null
  session_configs: null

trainer:
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  callbacks:
    effective_batch_size:
      _target_: foundry.training.callbacks.EffectiveBatchSizeCallback
      effective_batch_size: 1024
      init_val: 32
      max_val: 512
    early_stopping:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      patience: 20
    model_checkpoint:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      auto_insert_metric_name: false
      filename: best-behavior

hydra:
  sweeper:
    params:
      model/tokenizer: >-
        per_channel_cwt_cnn_hp,
        per_channel_cwt_cnn_log,
        per_channel_cwt_cnn_hp_log
      hyperparameters.fold_number: "0,1"
