# @package _global_
#
# Experiment 6: CWT Spectral Resolution — Tighter Bands with More Frequencies
#
# Tests whether increasing the number of CWT frequency bins while raising
# n_cycles (narrower, more selective bandpass filters) produces a better
# spectral decomposition for downstream classification.
#
# 2×2 factorial: num_freqs {9, 24} × n_cycles {2.5, 7.0}
# for both CWT-only and CWT+CNN architectures.
# All CWT configs use cwt_lr_multiplier=100 to allow the learnable
# frequencies and cycle counts to adapt during training.
# Baselines (CNN 12f, CNN 64f) are included for context.
#
# 6 new tokenizers × 2 folds = 12 new runs.
# Baselines reused from CWT_LR_AND_PARAM_MATCH (CWT 9f@100×LR, CWT+CNN 64f,
# CNN 64f) and TOKEN_RATE_SWEEP (CNN 12f).
#
# Launch:
#   uv run python main.py experiment=tokenizer_explore/poyo_ajile_cwt_spectral_resolution -m

defaults:
  - override /model: poyo_eeg
  - override /data: ajile/multisess
  - override /hydra/launcher: local_gpu

model:
  zero_output_timestamps: true
  embed_dim: 256
  tokenizer:
    temporal_embedding:
      target_token_rate: 200

data:
  split_type: intrasession
  task_type: behavior

run:
  name: ${hydra:runtime.choices.model/tokenizer}_rate200_fold${hyperparameters.fold_number}
  group: CWT_SPECTRAL_RESOLUTION
  tags: [spectral_resolution, behavior, poyo_eeg, ajile, intrasession, exp6]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  sequence_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 32
  learning_rate: 3e-4
  weight_decay: 0.007
  cwt_lr_multiplier: 100.0
  num_channels: null
  sampling_rate: null
  session_configs: null

trainer:
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  callbacks:
    effective_batch_size:
      _target_: foundry.training.callbacks.EffectiveBatchSizeCallback
      effective_batch_size: 1024
      init_val: 32
      max_val: 512
    early_stopping:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      patience: 20
    model_checkpoint:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      auto_insert_metric_name: false
      filename: best-behavior

hydra:
  launcher:
    gpus:
      - 1
      - 3
      - 4
      - 5
      - 6
      - 7
  sweeper:
    params:
      model/tokenizer: >-
        per_channel_cwt_9f_nc7,
        per_channel_cwt_24f_nc2p5,
        per_channel_cwt_24f_nc7,
        per_channel_cwt_cnn_9f_nc7,
        per_channel_cwt_cnn_24f_48F_nc2p5,
        per_channel_cwt_cnn_24f_48F_nc7
      hyperparameters.fold_number: "0,1"
