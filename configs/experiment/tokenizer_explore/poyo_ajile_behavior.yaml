# @package _global_

defaults:
  - override /model: poyo_eeg
  - override /data: ajile/singlesess
  - override /model/tokenizer: spatial_session_cwt
  - override /hydra/launcher: slurm_default

model:
  zero_output_timestamps: true

data:
  split_type: intrasession
  task_type: behavior

run:
  name: ajile_poyo_eeg_behavior_classifier
  group: DEBUG
  tags: [debug, baselines, training, poyo_eeg, ajile]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 100
  sequence_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 8
  learning_rate: 0.0012
  weight_decay: 0.09
  sampling_rate: 500
  num_channels: null
  session_configs: null

hydra:
  launcher:
    timeout_min: 180
    gres: gpu:l40s:1
    cpus_per_task: 8
    mem_gb: 32
    tasks_per_node: 1
    setup:
      - "set -a"
      - "source .env"
      - "set +a"
      - "export RANK=0"
      - "uv run python -m foundry.tools.stage_data --experiment tokenizer_explore/poyo_ajile_behavior"

