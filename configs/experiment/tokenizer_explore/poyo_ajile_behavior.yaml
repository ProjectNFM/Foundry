# @package _global_

defaults:
  - override /model: poyo_eeg
  - override /data: ajile/singlesess

model:
  zero_output_timestamps: true

data:
  split_type: intrasession
  task_type: behavior

run:
  name: ajile_poyo_eeg_behavior_classifier
  group: DEBUG
  tags: [debug, baselines, training, poyo_eeg, ajile]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  sequence_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 5
  learning_rate: 1e-4
  weight_decay: 0.01
  sampling_rate: 500
  num_channels: null
  session_configs: null
