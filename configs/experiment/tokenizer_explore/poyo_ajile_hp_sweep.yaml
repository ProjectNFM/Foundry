# @package _global_
#
# POYO EEG tokenizer exploration with hyperparameter sweep
# Optimizes batch size and learning rate for tokenizer training

defaults:
  - override /model: poyo_eeg
  - override /data: ajile/singlesess
  - override /optuna: bayes

task_configs:
  - ajile_inactive_active

model:
  zero_output_timestamps: true
  tokenizer:
    patch_duration: ${hyperparameters.patch_duration}
    channel_strategy:
      num_channels: 94

data:
  split_type: intrasession
  task_type: active_vs_inactive

run:
  name: ajile_poyo_hp_sweep_bs${hyperparameters.batch_size}_lr${hyperparameters.learning_rate}
  group: POYO_AJILE_HP_SWEEP
  tags: [sweep, poyo_eeg, ajile, optuna, hp_tuning]
  log_level: INFO

hyperparameters:
  batch_size: 64
  sequence_length: 1.0
  patch_duration: 0.1
  sampling_rate: 500
  fold_number: 0
  num_workers: 5
  learning_rate: 1e-3
  weight_decay: 0.001

trainer:
  max_epochs: 300
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val_loss
      mode: min
      patience: 30
    model_checkpoint:
      monitor: val_loss
      mode: min
      auto_insert_metric_name: false
      filename: "best-epoch{epoch:03d}-val_loss_{val_loss:.4f}"

sweep:
  metric_name: val_loss
  metric_direction: minimize
  search_space:
    hyperparameters.batch_size:
      type: categorical
      choices: [32, 64, 128, 256]
    hyperparameters.learning_rate:
      type: float
      low: 1e-5
      high: 1e-3
      log: true
    hyperparameters.weight_decay:
      type: float
      low: 0.0
      high: 0.01
      log: false
