# @package _global_
#
# Base experiment for W&B sweep hyperparameter searches on single-session
# behavior classification.
#
# NOT intended for direct CLI use — driven by scripts/wandb_sweep.py via
# scripts/wandb_sweep_train.py, which passes model/tokenizer, logger.id,
# and hyperparameter overrides per trial.
#
# Manual dry-run (one tokenizer, default HPs):
#   uv run python main.py experiment=tokenizer_explore/wandb_sweep_behavior model/tokenizer=spatial_session_cwt

defaults:
  - override /model: poyo_eeg
  - override /data: ajile/singlesess

model:
  zero_output_timestamps: true

data:
  split_type: intrasession
  task_type: behavior

run:
  name: sweep_${oc.env:WANDB_RUN_ID,default}
  group: WANDB_SWEEP
  tags: [wandb_sweep, hyperparameter_search, behavior, poyo_eeg, ajile]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  sequence_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 32
  learning_rate: 0.0006
  weight_decay: 0.007
  sampling_rate: 500
  num_channels: null
  session_configs: null

trainer:
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  callbacks:
    early_stopping:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      patience: 10
    model_checkpoint:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      auto_insert_metric_name: false
      filename: "best"

module:
  class_weights: null
  class_weight_smoothing: null
