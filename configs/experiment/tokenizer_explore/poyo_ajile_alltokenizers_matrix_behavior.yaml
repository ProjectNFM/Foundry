# @package _global_
#
# CWT vs ResampleCNN scaling comparison (behavior task).
#
# Compares per_channel_cwt and per_channel_resample_cnn at embed_dim 256 and
# 512 across 2 folds.  4 tokenizers × 2 folds = 8 runs.
#
# Launch:
#   uv run python main.py experiment=tokenizer_explore/poyo_ajile_alltokenizers_matrix_behavior -m

defaults:
  - override /model: poyo_eeg
  - override /data: ajile/multisess
  - override /hydra/launcher: local_gpu

_matrix:
  embed_dims:
    per_channel_cwt_dim512: 512
    per_channel_resample_cnn_dim512: 512

model:
  zero_output_timestamps: true
  embed_dim: ${oc.select:_matrix.embed_dims.${hydra:runtime.choices.model/tokenizer},256}

data:
  split_type: intrasession
  task_type: behavior

run:
  name: ${hydra:runtime.choices.model/tokenizer}_fold${hyperparameters.fold_number}
  group: CWT_VS_CNN_BEHAVIOR
  tags: [cwt_vs_cnn, scaling, behavior, poyo_eeg, ajile, intrasession]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 64
  sequence_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 32
  learning_rate: 3e-4
  weight_decay: 0.007
  num_channels: null
  sampling_rate: null
  session_configs: null

trainer:
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  callbacks:
    effective_batch_size:
      _target_: foundry.training.callbacks.EffectiveBatchSizeCallback
      effective_batch_size: 1024
      init_val: 16
      max_val: 512
    early_stopping:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      patience: 20
    model_checkpoint:
      monitor: val/ajile_active_behavior_auroc
      mode: max
      auto_insert_metric_name: false
      filename: best-behavior

hydra:
  sweeper:
    params:
      model/tokenizer: >-
        per_channel_cwt,
        per_channel_cwt_dim512,
        per_channel_resample_cnn,
        per_channel_resample_cnn_dim512
      hyperparameters.fold_number: "0,1"
