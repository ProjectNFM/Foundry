# @package _global_

defaults:
  - override /model: poyo_eeg
  - override /data: ajile/allsess
  - override /model/tokenizer: spatial_session_cwt

model:
  zero_output_timestamps: true

data:
  task_type: behavior

run:
  name: ajile_poyo_eeg_behavior_classifier
  group: DEBUG
  tags: [debug, baselines, training, poyo_eeg, ajile]
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 512
  sequence_length: 1.0
  patch_duration: 0.1
  fold_number: 0
  num_workers: 128
  learning_rate: 0.0006
  weight_decay: 0.09
  sampling_rate: null
  num_channels: null
  session_configs: null
