# @package _global_
#
# Neuroprobe cross-subject benchmark (DS-DM).
#
# Train once per task:
#   uv run python main.py experiment=neuroprobe/benchmark_cross_subject data.task=speech data.test_subject=1 data.test_session=1
#
# Eval-only on a new target session from checkpoint (no retraining):
#   uv run python main.py experiment=neuroprobe/benchmark_cross_subject run.mode=eval run.eval_checkpoint=/path/to/best.ckpt data.task=speech data.test_subject=3 data.test_session=0
#
# Sweep all tasks (train mode):
#   uv run python main.py -m experiment=neuroprobe/benchmark_cross_subject
#
# Sweep eval over all target sessions (after one training run per task):
#   uv run python main.py -m experiment=neuroprobe/benchmark_cross_subject run.mode=eval run.eval_checkpoint=/path/to/best.ckpt \
#       "data.test_subject=1,1,3,3,4,4,7,7,10,10" "data.test_session=1,2,0,1,0,1,0,1,0,1"

defaults:
  - override /model: poyo_eeg
  - override /data: neuroprobe/default

model:
  zero_output_timestamps: true

data:
  task_type: ${data.task}_binary
  task: speech
  label_mode: binary
  subset_tier: lite
  regime: DS-DM
  fold: 0
  test_subject: 1
  test_session: 1

run:
  mode: train
  eval_checkpoint: null
  name: neuroprobe_cross_subject_${run.mode}_${data.task}_s${data.test_subject}_t${data.test_session}
  group: NEUROPROBE_CROSS_SUBJECT
  tags:
    - neuroprobe
    - poyo_eeg
    - cross_subject
    - ${run.mode}
    - ${data.task}
  seed: 42
  log_level: INFO

hyperparameters:
  batch_size: 128
  sequence_length: 1.0
  patch_duration: 0.1
  sampling_rate: 2048
  num_channels: 155
  fold_number: 0
  num_workers: 4
  learning_rate: 1e-4
  weight_decay: 0.01

trainer:
  max_epochs: 10

stage:
  skip: true

hydra:
  sweeper:
    params:
      data.task: choice(onset,speech,volume,delta_volume,pitch,word_index,word_gap,gpt2_surprisal,word_head_pos,word_part_speech,word_length,global_flow,local_flow,frame_brightness,face_num)
